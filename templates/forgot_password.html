<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля - EasyCyberPro</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/images/logo.jpg" type="image/jpeg">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img class="nav-brand-logo" src="/static/images/logo.jpg" alt="EasyCyberPro Logo">
            <a href="/">EasyCyberPro</a>
        </div>
        <div class="nav-menu">
            <a href="/" class="nav-link">Главная</a>
            <a href="/login" class="nav-link">Вход</a>
            <a href="/register" class="btn-nav">Регистрация</a>
        </div>
    </nav>

    <div class="admin-login-container">
        <div class="admin-login-header">
            <h1>Восстановление пароля</h1>
            <p>Введите email для сброса пароля</p>
        </div>

        <div class="dashboard">
            {% if success %}
            <div style="background: rgba(52, 211, 153, 0.1); border: 1px solid #34d399; border-radius: 12px; padding: 20px; text-align: center;">
                <p style="color: #34d399; font-size: 16px;">✅ {{ success }}</p>
                <a href="/login" class="btn btn-primary" style="margin-top: 15px;">Вернуться ко входу</a>
            </div>
            {% else %}
            <form method="POST" action="/forgot-password" style="max-width: 400px; margin: 0 auto;">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>

                {% if error %}
                <div style="background: rgba(248, 113, 113, 0.1); border: 1px solid #f87171; border-radius: 8px; padding: 12px; margin-bottom: 20px;">
                    <p style="color: #f87171; font-size: 14px;">❌ {{ error }}</p>
                </div>
                {% endif %}

                <button type="submit" class="btn btn-primary" style="width: 100%;">Отправить инструкцию</button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <a href="/login" style="color: var(--text-secondary); font-size: 14px;">Вспомнили пароль? Войти</a>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
