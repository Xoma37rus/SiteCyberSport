<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля - EasyCyberPro</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/images/logo.jpg" type="image/jpeg">
</head>
<body>
    {% include 'includes/navbar.html' %}

    <div class="admin-login-container">
        <div class="admin-login-header">
            <h1>Сброс пароля</h1>
            <p>Придумайте новый пароль</p>
        </div>

        <div class="dashboard">
            {% if success %}
            <div style="background: rgba(52, 211, 153, 0.1); border: 1px solid #34d399; border-radius: 12px; padding: 20px; text-align: center;">
                <p style="color: #34d399; font-size: 16px;">✅ {{ success }}</p>
                <a href="/login" class="btn btn-primary" style="margin-top: 15px;">Войти с новым паролем</a>
            </div>
            {% elif error %}
            <div style="background: rgba(248, 113, 113, 0.1); border: 1px solid #f87171; border-radius: 12px; padding: 20px; text-align: center;">
                <p style="color: #f87171; font-size: 16px;">❌ {{ error }}</p>
                <a href="/forgot-password" class="btn btn-secondary" style="margin-top: 15px;">Запросить новый токен</a>
            </div>
            {% else %}
            <form method="POST" action="/reset-password" style="max-width: 400px; margin: 0 auto;">
                <input type="hidden" name="token" value="{{ token }}">

                <div class="form-group">
                    <label for="new_password">Новый пароль</label>
                    <input type="password" id="new_password" name="new_password" required minlength="6" placeholder="Минимум 6 символов">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Сменить пароль</button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <a href="/login" style="color: var(--text-secondary); font-size: 14px;">Вспомнили пароль? Войти</a>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
