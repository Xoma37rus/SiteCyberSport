<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="/static/images/logo.jpg" type="image/jpeg">
    <meta charset="UTF-8">
    <title>Новости - EasyCyberPro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% include 'includes/navbar.html' %}
    <div class="news-page-container">
        <div class="news-header"><h1>Новости</h1></div>
        <div class="news-feed">
            {% for news_item in news_list %}
            <article class="news-feed-item">
                {% if news_item.image_url %}
                <div class="news-feed-image" style="background-image: url('{{ news_item.image_url }}');"></div>
                {% else %}
                <div class="news-feed-image" style="background: linear-gradient(135deg, #00f0ff 0%, #3a86ff 100%);"></div>
                {% endif %}
                <div class="news-feed-content">
                    <h2><a href="/news/{{ news_item.id }}">{{ news_item.title }}</a></h2>
                    <p>{{ news_item.excerpt or news_item.content[:200] }}...</p>
                    <div style="margin-top: 20px;">
                        <a href="/news/{{ news_item.id }}" class="btn btn-primary btn-small">Читать далее →</a>
                    </div>
                </div>
            </article>
            {% else %}
            <div class="news-empty"><h3>Новостей пока нет</h3></div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
