<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>О нас - EasyCyberPro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img class="nav-brand-logo" src="/static/images/logo.jpg" alt="EasyCyberPro Logo">
            <a href="/">EasyCyberPro</a>
        </div>
        <div class="nav-menu">
            <a href="/" class="nav-link">Главная</a>
            <a href="/login" class="nav-link">Вход</a>
            <a href="/register" class="btn-nav">Регистрация</a>
        </div>
    </nav>

    <div class="about-container" style="max-width: 900px; margin: 0 auto; padding: 60px 20px;">
        <div class="about-content" style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 50px;">
            <h1 style="color: var(--text-primary); font-size: 42px; margin-bottom: 40px; text-align: center;">О платформе</h1>
            <section class="about-section" style="margin-bottom: 40px;">
                <h2 style="color: var(--accent-cyan); margin-bottom: 20px;">Наша миссия</h2>
                <p style="color: var(--text-secondary); line-height: 1.8;">EasyCyberPro — современная киберспортивная платформа для объединения игроков и команд.</p>
            </section>
            <section class="about-section" style="margin-bottom: 40px;">
                <h2 style="color: var(--accent-cyan); margin-bottom: 20px;">Возможности</h2>
                <ul style="list-style: none; padding: 0;">
                    <li style="padding: 15px 0; color: var(--text-secondary);">🔐 Безопасная регистрация и авторизация</li>
                    <li style="padding: 15px 0; color: var(--text-secondary);">🏆 Турниры и соревнования</li>
                    <li style="padding: 15px 0; color: var(--text-secondary);">📊 Статистика и рейтинги</li>
                </ul>
            </section>
            <div class="about-cta" style="text-align: center; margin-top: 50px;">
                <a href="/register" class="btn btn-primary btn-large">Присоединиться</a>
            </div>
        </div>
    </div>
</body>
</html>
